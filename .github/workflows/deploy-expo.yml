name: Deploy Expo (OTA)

# 프론트엔드(JS/에셋/설정)가 main에 바뀔 때만 EAS Update(OTA)로 반영.
# 네이티브 변경이 필요한 경우(새 네이티브 의존성 등)는 OTA가 아니라
# 수동 "EAS Build (Android)" 워크플로로 새 빌드를 올려야 한다.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "assets/**"
      - "app.json"
      - "package.json"
      - "package-lock.json"
      - "babel.config.js"
      - "metro.config.js"
      - "tsconfig.json"
      - "plugins/**"
      - "eas.json"
      - ".github/workflows/deploy-expo.yml"
  workflow_dispatch:

jobs:
  update:
    name: EAS Update (OTA — production channel)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: EAS Update
        run: eas update --branch production --message "Deploy from main $(git log -1 --pretty=%s)"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
