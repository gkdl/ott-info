name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── 1. Supabase Edge Functions + DB 마이그레이션 배포 ─────────────────────
  deploy-supabase:
    name: Deploy Supabase (Google Cloud)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run DB migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy Edge Functions
        run: supabase functions deploy --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ── 2. Expo EAS Update (OTA 배포) ─────────────────────────────────────────
  deploy-expo:
    name: Deploy Expo (EAS Update)
    runs-on: ubuntu-latest
    needs: deploy-supabase

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: EAS Update (OTA — production channel)
        run: eas update --branch production --message "Deploy from main $(git log -1 --pretty=%s)"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
