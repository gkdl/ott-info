name: EAS Build (Android)

# main에 앱 코드가 머지되면 자동으로 EAS 빌드(AAB) 생성.
# 문서/서버(supabase)/워크플로만 바뀐 경우엔 빌드하지 않도록 paths 필터를 둔다
# (EAS 무료 빌드 할당량 절약). 수동 실행(workflow_dispatch)도 계속 가능.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "assets/**"
      - "app.json"
      - "package.json"
      - "package-lock.json"
      - "babel.config.js"
      - "metro.config.js"
      - "tsconfig.json"
      - "plugins/**"
      - "eas.json"
      - ".github/workflows/eas-build.yml"
  workflow_dispatch:
    inputs:
      profile:
        description: "eas.json build profile"
        default: production
        type: choice
        options: [production, preview]

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      # 키스토어는 리포에 없으므로(gitignore) GitHub Secret에서 복원한다.
      # 필요한 Secrets:
      #   ANDROID_KEYSTORE_BASE64  = base64 -w0 ott-info-upload.keystore
      #   ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
      - name: Restore signing credentials
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > ott-info-upload.keystore
          cat > credentials.json <<JSON
          {
            "android": {
              "keystore": {
                "keystorePath": "ott-info-upload.keystore",
                "keystorePassword": "$KEYSTORE_PASSWORD",
                "keyAlias": "$KEY_ALIAS",
                "keyPassword": "$KEY_PASSWORD"
              }
            }
          }
          JSON

      # push 트리거엔 inputs가 없으므로 production으로 폴백
      - name: EAS Build (Android)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile ${{ github.event.inputs.profile || 'production' }} --non-interactive --no-wait
