name: EAS Build (Android)

# main에 앱 코드가 머지되면 자동으로 EAS 빌드(AAB) 생성.
# 문서/서버(supabase)/워크플로만 바뀐 경우엔 빌드하지 않도록 paths 필터를 둔다
# (EAS 무료 빌드 할당량 절약). 수동 실행(workflow_dispatch)도 계속 가능.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "assets/**"
      - "app.json"
      - "package.json"
      - "package-lock.json"
      - "babel.config.js"
      - "metro.config.js"
      - "tsconfig.json"
      - "plugins/**"
      - "eas.json"
      - ".github/workflows/eas-build.yml"
  workflow_dispatch:
    inputs:
      profile:
        description: "eas.json build profile"
        default: production
        type: choice
        options: [production, preview]

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      # 서명 키스토어는 EAS 서버에 보관된 것(remote)을 사용하므로 별도 복원 불필요.
      # push 트리거엔 inputs가 없으므로 production으로 폴백.
      - name: EAS Build (Android)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile ${{ github.event.inputs.profile || 'production' }} --non-interactive --no-wait
